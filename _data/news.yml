  key: news-pm2022-x-convegno
  title:
    en: PM 2022 - 10th Conference on Atmospheric Particulate
    it: PM 2022 - X Convegno sul particolato atmosferico
  abstract:
    en: "PM_TEN will be there with the intervention of its Lab Manager Lorenzo Caponi, who will present the results obtained studying an innovative methodology for measuring Black Carbon and developing the integrated optical module in the GianoBC1 sequential sampler."
    it: "PM_TEN sarà presente con l'intervento del suo Lab Manager Lorenzo Caponi, che venerdì 20 maggio alle ore 11:45 (Aula B del Best Western Plus Tower Hotel) presenterà i risultati ottenuti dallo studio di una metodologia innovativa per la misura del #BlackCarbon e dallo sviluppo del modulo ottico integrato nel campionatore sequenziale #GianoBC1"
  date: 2022-05-20
