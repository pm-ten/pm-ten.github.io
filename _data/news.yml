  key: news-gianobc1-arpal
  title:
    en: Arpal uses GianoBC1 for black carbon tests
    it: Arpal utilizza GianoBC1 per i test sul black carbon 
  abstract:
    en: "Happy and proud that the innovative technology for real-time measurement of BlackCarbon patented by PM_TEN s.r.l. together with Dado lab Srl and integrated in GianoBC1 is tested by Arpal - Ligurian regional environmental protection agency at one of the most significant sites for air quality in Genoa."
    it: "Felici e orgogliosi che la tecnologia innovativa per la misura in tempo reale del #BlackCarbon brevettata da PM_TEN s.r.l. insieme a Dado lab Srl e integrata nel #GianoBC1 sia testata da Arpal - Agenzia regionale per la protezione dell'ambiente ligure presso uno dei siti più significativi per la qualità dell'aria nella nostra città #Genova"
  date: 2021-03-01
  image: media/news/gianobc1-arpal.jpg
