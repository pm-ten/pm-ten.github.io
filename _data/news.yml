  key: news-carbonaceous-aerosol
  title:
    en: "Carbonaceous Aerosol: a systematic investigation through the CALIPSO project"
    it: "Aerosol Carbonioso: un'indagine sistematica attraverso il progetto CALIPSO"
  abstract:
    en: "In the frame of the CALIPSO project an interesting experimental campaign was recently concluded at ChAMBRe (Chamber for Aerosol Modelling and Bio-aerosol Research), the atmospheric simulation chamber located at the INFN in Genoa and managed in collaboration with the Environmental Physics Laboratory of the University of Genoa."
    it: "Si è recentemente conclusa, nell'ambito del progetto CALIPSO, un'interessante campagna sperimentale presso ChAMBRe (Chamber for Aerosol Modelling and Bio-aerosol Research), la camera di simulazione atmosferica situata presso l'INFN di Genova e gestita in collaborazione con il Laboratorio di Fisica Ambientale dell'Università di Genova."
  date: 2024-07-31
  image: media/news/carbonaceous-aerosol.jpg