title:
  en: "AIDII 39th Congress"
  it: "39° Congresso AIDII"
abstract:
  en: "The 39th edition of the Congress of the Association of Industrial Hygienists will take place between June 14 and June 16 in Arenzano (GE). Paolo Brotto (PM_TEN CEO/CTO) will speak about carbon aerosol measurements."
  it: "La 39a edizione del Congresso dell’Associazione Degli Igienisti Industriali avrà luogo tra il 14 e il 16 giugno ad Arenzano (GE). Interverrà anche Paolo Brotto (PM_TEN CEO/CTO) per parlare di misure di aerosol carbonioso."
